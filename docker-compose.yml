services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: handson-ml3-dev:local
    container_name: handson-ml3
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_TOKEN=
      - JUPYTER_PASSWORD=
    restart: unless-stopped